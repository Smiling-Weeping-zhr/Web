{% extends "base.html" %}
{% block title %}AI Assistant{% endblock %}

{% block body %}

<div class="ui container" style="margin-top:3em">

    <h2 class="ui header" style="color:#74D7D7">
        <i class="robot icon"></i>
        AI Assistant
        <div class="sub header">Ask anything about datasets or research</div>
    </h2>

    <!-- ===================== -->
    <!-- Chat Box -->
    <!-- ===================== -->
    <div id="chat-box" class="ui segment" style="height:500px; overflow-y:auto; margin-bottom:1em; background-color:#f9f9f9;">
        <!-- 系统初始消息 -->
        <div class="ui message">
            <div class="header">AI</div>
            <p>Hello 👋 I'm your research assistant. How can I help you today?</p>
        </div>
    </div>

    <!-- ===================== -->
    <!-- Input Area -->
    <!-- ===================== -->
    <div class="ui form">
        <div class="field">
            <div class="ui action input" style="width:100%">
                <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off" style="width:80%">
                <button class="ui teal button" id="send-btn" style="width:18%">
                    <i class="paper plane icon"></i> Send
                </button>
            </div>
        </div>
    </div>

</div>

<!-- ===================== -->
<!-- Chat JS -->
<!-- ===================== -->
<script>
    const chatBox = document.getElementById("chat-box");
    const inputField = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    function appendMessage(sender, message) {
        const div = document.createElement("div");
        div.className = "ui message" + (sender==="You" ? " blue right aligned" : "");
        div.innerHTML = `
            <div class="header">${sender}</div>
            <p>${message}</p>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = inputField.value.trim();
        if (!message) return;

        // 添加用户消息
        appendMessage("You", message);
        inputField.value = "";

        // 添加加载状态
        appendMessage("AI", "Thinking...");

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            // 移除 "Thinking..."
            chatBox.removeChild(chatBox.lastChild);

            appendMessage("AI", data.reply || "No response from AI.");

        } catch (error) {
            chatBox.removeChild(chatBox.lastChild);
            appendMessage("AI", "Error connecting to AI service.");
        }
    }

    // 点击发送
    sendBtn.addEventListener("click", sendMessage);

    // 回车发送
    inputField.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

{% endblock %}
